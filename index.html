<!DOCTYPE html>
<html>
<head>
  <title>Phone Status</title>
</head>
<body>
  <h1>Magnus' iPhone 16 Status</h1>
  <div id="status">Loading...</div>

  <script>
    async function updateStatus() {
      try {
        const res = await fetch('status.json'); // GitHub-hosted JSON
        const data = await res.json();
        document.getElementById('status').innerText = 
          `Battery: ${data.battery}%\nWi-Fi: ${data.wifi}`;
      } catch (err) {
        document.getElementById('status').innerText = 'Error fetching status';
      }
    }

    setInterval(updateStatus, 5000); // updates every 5 seconds
    updateStatus();
  </script>
</body>
</html>
